<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>SVGs</title>
    </head>
    <body>
        <header>
            <h1>SVGs</h1>

            <p><abbr title="Scalable Vector Graphics">SVG</abbr>s are a different way to have images on your page, since most
                images aren't scalable. This is why an image for instance will 
                become lower resolution over time.</p>
   
            <nav>
                <ul>
                    <li><a href="../HTML Pantheon Main.html">Home</a></li>
                </ul>
            </nav>

        </header>
        <main>
            <h2>Different Shapes</h2>
            <div>
                <figure>
                    <svg>
                        <circle cx="50" cy="70" r="30" fill="red"></circle>
                    </svg>
                    <figcaption>This is a red circle</figcaption>
                </figure>
                
                <figure>
                    <svg>
                        <rect x="10" y="70" width="150" height="150" fill="blue"></rect>
                    </svg>
                    <figcaption>This is a blue rectangle</figcaption>
                </figure>

                <figure>
                    <svg>
                        <line x1="20" y1="20" x2="120" y2="120" stroke ="green"></line>
                    </svg>
                    <figcaption>This is a green line</figcaption>
                </figure>
            </div>
            <p>All of these are <abbr title="Scalabe Vector Graphics">SVG</abbr>s! If it wasn't obvious by them being
            2 dimensional easy to draw shapes...</p>
        </main>
    </body>
</html>
